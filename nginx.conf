server {
  # Listen on a non-privileged port so the container can run as the `nginx`
  # user (uid 101) under nginxinc/nginx-unprivileged:alpine. The Tailscale
  # sidecar terminates :443 and proxies here.
  listen 8080;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers (w3-2 Track 5). `always` so they ship on error responses too.
  # CSP: default self; img allows the GitHub avatar host the Repos component may
  # render + data: URIs; style needs unsafe-inline for Tailwind's injected styles;
  # connect-src must allow api.github.com — Repos fetches live repos from it at load.
  # Tighten after the smoke confirms nothing breaks (never loosen default-src).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://avatars.githubusercontent.com data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://api.github.com" always;

  # SPA fallback — mirrors netlify.toml /* → /index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
